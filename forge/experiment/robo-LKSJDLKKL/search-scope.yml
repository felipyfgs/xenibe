schema-version: 1
flow:
  - context
  - regime
  - volatility
  - structure
  - setup
  - trigger
  - confirmation
  - decision
limits:
  max-candidates: dynamic
  max-seconds: 60
  batch-size: 5
  max-rounds: dynamic
  stagnation-rounds: dynamic
components:
  context: []
  regime:
    - type: trend
      parameters:
        timeframe:
          - M5
        method:
          - ema-slope
        fast-period:
          - 9
        slow-period:
          - 21
        min-adx:
          - 18
    - type: range
      parameters:
        timeframe:
          - M5
        method:
          - adx-compression
        max-adx:
          - 18
  volatility:
    - type: atr-normalized
      parameters:
        period:
          - 14
        min-ratio:
          - 0.6
        max-ratio:
          - 1.8
    - type: candle-anomaly-filter
      parameters:
        lookback:
          - 20
        max-body-ratio:
          - 2.5
  structure:
    - type: support-resistance-zone
      parameters:
        lookback:
          - 50
        tolerance-atr:
          - 0.25
    - type: pullback-to-ema
      parameters:
        ema-period:
          - 21
        tolerance-atr:
          - 0.2
    - type: range-break-retest
      parameters:
        lookback:
          - 30
        retest-tolerance-atr:
          - 0.3
  setup:
    - type: trend-pullback
      parameters:
        direction:
          - with-trend
        min-pullback-candles:
          - 2
    - type: breakout-retest
      parameters:
        confirmation-close:
          - true
    - type: sr-reversal
      parameters:
        rejection-required:
          - true
  trigger:
    - type: engulfing
      parameters:
        close-required:
          - true
        side:
          - call
          - put
    - type: pinbar-rejection
      parameters:
        min-wick-ratio:
          - 0.55
        side:
          - call
          - put
    - type: momentum-close
      parameters:
        body-min-atr:
          - 0.35
        side:
          - call
          - put
  confirmation:
    - type: multi-timeframe-alignment
      parameters:
        entry-timeframe:
          - M1
        confirm-timeframe:
          - M5
    - type: rsi-zone
      parameters:
        period:
          - 14
        call-min:
          - 45
        put-max:
          - 55
  decision:
    - type: weighted-score
      parameters:
        min-score:
          - 0.7
        entry:
          - next-candle-open
        expiration-candles:
          - 1
          - 3
